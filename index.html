<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">2048</h1>
        </div>

        <div class="score-container">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="newGame()">New Game</button>
            <button class="btn" onclick="undoMove()">Undo</button>
        </div>

        <div class="game-board">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="gameOver">
                <h2>Game Over!</h2>
                <button class="btn" onclick="newGame()">Try Again</button>
            </div>
        </div>

        <div class="mobile-controls">
            <button class="btn" onclick="moveUp()">↑</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="moveLeft()">←</button>
                <button class="btn" onclick="moveDown()">↓</button>
                <button class="btn" onclick="moveRight()">→</button>
            </div>
        </div>

        <div class="instructions">
            <p><strong>How to play:</strong> Use arrow keys or swipe to move tiles. Combine same numbers to reach 2048!</p>
        </div>
    </div>
</body>
</html>
